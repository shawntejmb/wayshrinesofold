nexusDescription="[b][u]Wayshrines Of Origins - A Fast Travel Overhaul\n<br />\n<br />[/u][/b]This is sort of a re-release of the original [url=https://www.nexusmods.com/skyrimspecialedition/mods/173799?]Wayshrines of Old[/url] mod that has got all of it's previous issues fixed. This version also serves as a base for possible future updates and additions. This mod originally released back in 2017, which I have had in my load order ever since. Now I decided it's time to put some love back in to it, as it has blessed many of my playthroughs ever since!\n<br />\n<br />Wayshrines of Origins adds remnants of the second era, wayshrines, as an alternate way to travel the province of Skyrim and Solstheim!\n<br />\n<br />Changes:\n<br />[spoiler][list]\n<br />[*]Meshes now use vanilla texture paths, so that your installed retextures apply with support to both CM &amp; PBR (with the exception of 2 textures, which are unique to the mod itself)[/*]\n<br />[*]Fixed all the clipping issues with wayshrines clipping with trees, flora or other objects (this also makes the mod natively more compatible with various flora and tree replacers)[/*]\n<br />[*]Smoothed out the terrain at wayshrines located at snowy areas[/*]\n<br />[*]Main plugin has been re-organized and cleaned for consistency and to serve as a better base for future additions[/*]\n<br />[*]Mod folder structure has been re-organized and cleaned for consistency and to serve as a better base for future additions[/*]\n<br />[/list][/spoiler]\n<br />\n<br />[u]What does this mod do?[/u]:\n<br />\n<br />This mod adds a wayshrine to every hold and major city in Skyrim and Solstheim, allowing you to travel between wayshrines. It’s a perfect addition for players who have disabled fast travel, play in Survival Mode, or simply prefer a more immersive alternative to traditional fast travel system.\n<br />\n<br />The wayshrines have been carefully placed to avoid providing direct access to every destination. In most cases, you’ll still need to travel part of the way to reach your final destination, with only a few exceptions, such as Riften.\n<br />\n<br />Please refer to the screenshots for more details on their locations!\n<br />\n<br />Included areas are:\n<br />[img width=15,height=15]https://static.wikia.nocookie.net/elderscrolls/images/8/8c/DaedricShrine.svg/revision/latest?cb=20111119103504[/img] Whiterun\n<br />[img width=15,height=15]https://static.wikia.nocookie.net/elderscrolls/images/8/8c/DaedricShrine.svg/revision/latest?cb=20111119103504[/img] Markarth\n<br />[img width=15,height=15]https://static.wikia.nocookie.net/elderscrolls/images/8/8c/DaedricShrine.svg/revision/latest?cb=20111119103504[/img] Riften\n<br />[img width=15,height=15]https://static.wikia.nocookie.net/elderscrolls/images/8/8c/DaedricShrine.svg/revision/latest?cb=20111119103504[/img] Windhelm\n<br />[img width=15,height=15]https://static.wikia.nocookie.net/elderscrolls/images/8/8c/DaedricShrine.svg/revision/latest?cb=20111119103504[/img] Solitude\n<br />[img width=15,height=15]https://static.wikia.nocookie.net/elderscrolls/images/8/8c/DaedricShrine.svg/revision/latest?cb=20111119103504[/img] Falkreath\n<br />[img width=15,height=15]https://static.wikia.nocookie.net/elderscrolls/images/8/8c/DaedricShrine.svg/revision/latest?cb=20111119103504[/img] Morthal\n<br />[img width=15,height=15]https://static.wikia.nocookie.net/elderscrolls/images/8/8c/DaedricShrine.svg/revision/latest?cb=20111119103504[/img] Dawnstar\n<br />[img width=15,height=15]https://static.wikia.nocookie.net/elderscrolls/images/8/8c/DaedricShrine.svg/revision/latest?cb=20111119103504[/img] Winterhold\n<br />\n<br />Unique Locations:\n<br />[img width=15,height=15]https://static.wikia.nocookie.net/elderscrolls/images/8/8c/DaedricShrine.svg/revision/latest?cb=20111119103504[/img] High Hrothgar\n<br />[img width=15,height=15]https://static.wikia.nocookie.net/elderscrolls/images/8/8c/DaedricShrine.svg/revision/latest?cb=20111119103504[/img] Skaal Village\n<br />[img width=15,height=15]https://static.wikia.nocookie.net/elderscrolls/images/8/8c/DaedricShrine.svg/revision/latest?cb=20111119103504[/img] Raven Rock\n<br />[img width=15,height=15]https://static.wikia.nocookie.net/elderscrolls/images/8/8c/DaedricShrine.svg/revision/latest?cb=20111119103504[/img] Castle Volkihar\n<br />[img width=15,height=15]https://static.wikia.nocookie.net/elderscrolls/images/8/8c/DaedricShrine.svg/revision/latest?cb=20111119103504[/img] Dayspring Canyon\n<br />\n<br />[u]Future plans?[/u]:\n<br />Me and MewMewShawnte have discussed about possible future additions to the mod, such as. remaking the wayshrines models and textures as well as possibly adding/relocating some wayshrines and more! Nothing is confirmed yet but we'll see what happens! You can check out some of the development [url=https://i.postimg.cc/J4M9sj3x/Screenshot-2026-03-14-191551.png]here[/url] and [url=https://www.youtube.com/watch?v=ln4NJAv2hRM]here[/url]!\n<br />\n<br />Also looking for someone that could do a retexture with PBR (Also why not CM too) to the 2 diffuse texture files included in the mod. You can post it as a separate mod or get it included within the main mod here with credits given of course. Please contact me via DM if you're interested!\n<br />\n<br />[u]Installation[/u]:\n<br />Check the requirements tab and install the required mods you need (currently no requirements)\n<br />Install this mod\n<br />\n<br />[u]Compatibility[/u]:\n<br />Incompatible with:\n<br />- City Of Crossed Daggers\n<br />- Surrender - Enemies Yield and Comply with Your Demands\n<br />\n<br />No other incompatibilities have been found so far. If you find any, please let us know! Everyone is also free to make a patch if wanted.\n<br />\n<br />[u]Recommended mods[/u]:\n<br />[url=https://www.nexusmods.com/skyrimspecialedition/mods/33152]No Fast Travel[/url] by lilebonymace\n<br />\n<br />[u]Credits[/u]:\n<br />MewMewShawnte  - Base mod, Wayshrine models and being awesome to let me to work on and host this mod\n<br />Cutleast - FOMOD Creation Kit"
